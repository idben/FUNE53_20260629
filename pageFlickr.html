    <style>
        .w250px {
            width: 250px;

            }

        .h250px {
            position: relative;

            /* background-image: url(https://images.pexels.com/photos/8647195/pexels-photo-8647195.jpeg); */
            background-size: cover;
            background-position: center center;

            &::after {
                content: "";
                position: absolute;
                left: 0;
                bottom: 0;
                width: 100%;
                height: 100%;
                background: #000000;
                background: linear-gradient(0deg, rgba(0, 0, 0, 0.5) 0%, rgba(255, 255, 255, 0) 100%);
            }
        }

        aside .container .nav .nav-link.actvie {
