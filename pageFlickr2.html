<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .w250px {
            width: 250px;
            transition: width 0.2s;

            &:focus-within {
                width: 400px;
            }

            input::placeholder {
                color: #000;
            }
        }

        .h700px {
            height: 700px;
        }


        main {
            min-height: 200vh;
        }

        .h200px {
            height: 200px;
        }
    </style>
    <title>Flickr 版型</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top" data-bs-theme="dark">
        <div class="container">
            <a class="navbar-brand" href="#">Navbar</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Dropdown
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Action</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                    </li>
                </ul>
                <form class="d-flex align-items-center" role="search">
                    <div class="position-relative w250px">
                        <input class="form-control bg-secondary text-dark rounded-pill ps-4" type="search"
                            placeholder="相片﹑人物或群組" aria-label="Search" />
                        <i class="fa-solid fa-magnifying-glass position-absolute start-0 top-0 ps-1 pt-2"></i>
                    </div>

                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>
    <header class="h700px bg-dark">
        <div id="carouselExample" class="carousel h-100 slide">
            <div class="carousel-inner h-100">
                <div class="carousel-item h-100">
                    <img src="https://images.pexels.com/photos/8647195/pexels-photo-8647195.jpeg"
                        class="h-100 w-100 object-fit-contain" alt="...">
                </div>
                <div class="carousel-item h-100 active">
                    <img src="https://images.pexels.com/photos/26654655/pexels-photo-26654655.jpeg"
                        class="h-100 w-100 object-fit-contain" alt="...">
                </div>
                <div class="carousel-item h-100">
                    <img src="https://images.pexels.com/photos/952365/pexels-photo-952365.jpeg"
                        class="h-100 w-100 object-fit-contain" alt="...">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
    </header>
    <main></main>
    <footer class="bg-dark">
        <div class="container px-5">
            <div class="nav border-bottom border-primary justify-content-between mx-lg-5">
                <a class="nav-link text-white" href="#">Link</a>
                <a class="nav-link text-white" href="#">Link</a>
                <a class="nav-link text-white" href="#">Link</a>
                <a class="nav-link text-white" href="#">Link</a>
                <a class="nav-link text-white" href="#">Link</a>
                <a class="nav-link text-white" href="#">Link</a>
                <a class="nav-link text-white" href="#">Link</a>
            </div>
            <div class="nav justify-content-between mx-lg-5">
                <a class="nav-link text-white" href="#">Link</a>
                <a class="nav-link text-white" href="#">Link</a>
                <a class="nav-link text-white ms-auto" href="#">Link</a>
                <a class="nav-link text-white" href="#">Link</a>
                <a class="nav-link text-white" href="#">Link</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
